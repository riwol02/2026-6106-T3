<head>
    <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static', filename='styles.css')}}">

</head>

<body>
    <div class="container">
        <h2>Deposit Money</h2>
        <input type="text" id="senderAddress" placeholder="Enter Sender Adress">
        <input type="text" id="amount" placeholder="Enter Amount">

        <button class="btn" onclick="deposit()">Deposit</button>
        <button class="btn" onclick="transaction()">View Transactions</button>

        <form action="/main" method="post">
            <input type="submit" value="Main">
        </form>
        
        <p id="view_payer"></p >
        <p id="view_amount"></p >

        <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
        <script>
            const contractAddress = "0xc96ef6a6aaae53b50529e5a3e607ba2c6c7ef15c";
            const contractABI = [
	{
		"inputs": [
                    {
                        "internalType": "address",
                        "name": "_payer",
                        "type": "address"
                    },
                    {
                        "internalType": "address",
                        "name": "_payee",
                        "type": "address"
                    },
                    {
                        "internalType": "uint256",
                        "name": "_amount",
                        "type": "uint256"
                    }
                ],
                "name": "weixin",
                "outputs": [],
                "stateMutability": "payable",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "checkTransaction",
                "outputs": [
                    {
                        "internalType": "address",
                        "name": "",
                        "type": "address"
                    },
                    {
                        "internalType": "address",
                        "name": "",
                        "type": "address"
                    },
                    {
                        "internalType": "uint256",
                        "name": "",
                        "type": "uint256"
                    }
                ],
                "stateMutability": "view",
                "type": "function"
            }
        ];
        
        const web3 = new Web3(Web3.givenProvider);
        const contract = new web3.eth.Contract(contractABI, contractAddress);

        async function deposit(){
            const accounts = await web3.eth.requestAccounts();
            console.log(accounts[0]);
            const depositor = document.getElementById("depositor").value;
            const amount = document.getElementById("amount").value;
            console.log(depositor,amount)

            await contract.methods.deposit_money(depositor,amount).send({from:accounts[0]});
        }

        async function transaction() {
            result = await contract.methods.deposit_view().call();
            console.log(result[0],result[1]);
            document.getElementById("view_depositor").innerText = "Payer : " + result[0];
            document.getElementById("view_amount").innerText = "Amount : " + result[1];
        }
        </script>
    </div>    
</body>
